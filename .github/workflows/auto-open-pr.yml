name: Auto-open PR for find-tasks branches

on:
  push:
    branches:
      - 'find-tasks/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open for $BRANCH — skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$BRANCH: find-tasks specs" \
            --body "Auto-generated by the \`tasks\` scheduled task.

          - Specs in \`docs/specs/\`
          - Pending issues in \`docs/pending-issues.json\` (creados por workflow \`create-issues.yml\` al pushear)

          Revisar y mergear cuando esté listo."
